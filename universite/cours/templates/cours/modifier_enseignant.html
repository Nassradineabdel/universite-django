<!DOCTYPE html>
<html>
<head>
    <title>Modifier un enseignant</title>
</head>
<body>
    <h1>Modifier un enseignant</h1>
    <p>Utilisateur connecté : {{ user.username }}</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Modifier</button>
    </form>
    <br>
    <a href="{% url 'liste_enseignants' %}">Retour à la liste des enseignants</a>
</body>
</html>
