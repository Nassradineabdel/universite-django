<!DOCTYPE html>
<html>
<head>
    <title>Ajouter un enseignant</title>
</head>
<body>
    <h1>Ajouter un enseignant</h1>
    <p>Utilisateur connecté : {{ user.username }}</p>
    <a href="{% url 'liste_enseignants' %}">Retour à la liste</a>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Ajouter</button>
    </form>
</body>
</html>
