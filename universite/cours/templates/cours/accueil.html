<!DOCTYPE html>
<html>
<head>
    <title>Accueil</title>
</head>
<body>
    <center>
    <h1>Bienvenue dans l'application Université merci</h1>
    </center>
    {% if user.is_authenticated %}
    <p>Bonjour {{ user.username }}, vous êtes connecté.</p>
    <a href="{% url 'liste_cours' %}">Voir les cours</a><br>
    <a href="{% url 'liste_enseignants' %}">Voir les enseignants</a><br>
    <a href="{% url 'deconnexion' %}">Se déconnecter</a>
    {% else %}
    <p>Vous n'êtes pas connecté.</p>
    <a href="{% url 'connexion' %}">Se connecter</a>
    {% endif %}
</body>
</html>
