<!DOCTYPE html>
<html>
<head>
    <title>Liste des cours</title>
</head>
<body>
    <h1>Liste des cours</h1>
    <p>Utilisateur connecté : {{ user.username }}</p>
    <a href="{% url 'ajouter_cours' %}">Ajouter un cours</a>
    <a href="{% url 'liste_enseignants' %}">Voir les enseignants</a>
    <a href="{% url 'deconnexion' %}">Se déconnecter</a>
    <ul>
        {% for c in cours %}
        <li>
            {{ c.titre }} - {{ c.enseignant }} - Crédit : {{ c.credit }}
            <a href="{% url 'modifier_cours' c.id %}">Modifier</a>
            <a href="{% url 'supprimer_cours' c.id %}">Supprimer</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
